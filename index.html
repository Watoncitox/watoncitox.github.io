<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Sitio en construcción para bastiansanches.dev" />
    <title>bastiansanches.dev | En construcción</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f172a;
        --panel: rgba(15, 23, 42, 0.8);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #38bdf8;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(56, 189, 248, 0.2), transparent 35%),
          linear-gradient(160deg, #020617, var(--bg));
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 720px);
        padding: 48px 32px;
        background: var(--panel);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 24px;
        text-align: center;
        box-shadow: 0 24px 80px rgba(2, 6, 23, 0.45);
        backdrop-filter: blur(10px);
      }

      .badge {
        display: inline-block;
        margin-bottom: 20px;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(56, 189, 248, 0.12);
        color: var(--accent);
        font-size: 0.875rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.2rem, 7vw, 4.5rem);
        line-height: 1.05;
      }

      p {
        margin: 18px auto 0;
        max-width: 38rem;
        font-size: clamp(1.05rem, 2.5vw, 1.25rem);
        line-height: 1.7;
        color: var(--muted);
      }

    </style>
  </head>
  <body>
    <main>
      <span class="badge">En construcción</span>
      <h1>bastiansanches.dev</h1>
      <p>
        Estamos preparando una nueva página para este dominio. Vuelve pronto para
        ver el resultado final.
      </p>
    </main>
  </body>
</html>
